name: Continiuous Integration & Deployment
run-name: ${{ github.run_id }} - Showtimex CI&CD - 🚀

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  run-linter:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-runner
      - name: Run linter
        run: npm run lint

  run-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-runner
      - name: Run tests
        run: npm run test

  deploy:
    runs-on: ubuntu-latest
    needs: [run-linter, run-tests]
    steps:
      - name: 'Initiating Deployment'
        run: echo "Deploying..."
