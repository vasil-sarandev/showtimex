openapi: 3.0.3
info:
  title: Event API
  version: 1.0.0
servers:
  - url: http://localhost:3000
tags:
  - name: Event
    description: Event-related operations
  - name: Performer
    description: Performer-related operations
  - name: Ticket
    description: Ticket-related operations
  - name: Payment
    description: Payment-related operations
  - name: User
    description: User-related operations
  - name: Venue
    description: Venue-related operations
paths:
  /event:
    post:
      tags: [Event]
      summary: Create a new event
      operationId: createEvent
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateEventDTO'
      responses:
        '201':
          description: Event created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EventResponseDTO'

  /event/{id}:
    get:
      tags: [Event]
      summary: Get an event by ID
      operationId: getEventById
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Event found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EventResponseDTO'
        '404':
          description: Event not found

  /event/search:
    get:
      tags: [Event]
      summary: Search for events
      operationId: searchEvents
      parameters:
        - name: title
          in: query
          required: false
          schema:
            type: string
        - name: venueId
          in: query
          required: false
          schema:
            type: integer
        - name: performerIds
          in: query
          required: false
          schema:
            type: array
            items:
              type: integer
        - name: date
          in: query
          required: false
          schema:
            type: string
            format: date
        - name: page
          in: query
          required: false
          schema:
            type: integer
        - name: limit
          in: query
          required: false
          schema:
            type: integer
      responses:
        '200':
          description: Paginated list of events
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedEventResponse'

  /performer:
    post:
      tags: [Performer]
      summary: Create a new performer
      operationId: createPerformer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreatePerformerDTO'
      responses:
        '201':
          description: Performer created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PerformerResponseDTO'
        '400':
          description: Bad request

  /performer/{id}:
    get:
      tags: [Performer]
      summary: Get a performer by ID
      operationId: getPerformerById
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Performer found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PerformerResponseDTO'
        '404':
          description: Performer not found

  /performer/search:
    get:
      tags: [Performer]
      summary: Search for performers
      operationId: searchPerformers
      parameters:
        - name: name
          in: query
          required: false
          schema:
            type: string
        - name: page
          in: query
          required: false
          schema:
            type: integer
        - name: limit
          in: query
          required: false
          schema:
            type: integer
      responses:
        '200':
          description: Paginated list of performers
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedPerformerResponse'

  /ticket/batch:
    post:
      tags: [Ticket]
      summary: Create multiple tickets in a batch
      operationId: createTicketBatch
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateTicketBatchDTO'
      responses:
        '201':
          description: Tickets created
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/TicketResponseDTO'
        '400':
          description: Bad request

  /ticket/{id}:
    get:
      tags: [Ticket]
      summary: Get a ticket by ID
      operationId: getTicketById
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Ticket found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TicketResponseDTO'
        '404':
          description: Ticket not found

  /ticket/search:
    get:
      tags: [Ticket]
      summary: Search for tickets
      operationId: searchTickets
      parameters:
        - name: eventId
          in: query
          required: true
          schema:
            type: integer
        - name: status
          in: query
          required: false
          schema:
            type: string
            enum:
              - AVAILABLE
              - RESERVED
              - PURCHASED
        - name: page
          in: query
          required: false
          schema:
            type: integer
        - name: limit
          in: query
          required: false
          schema:
            type: integer
      responses:
        '200':
          description: Paginated list of tickets
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedTicketResponse'

  /payment/initiate:
    post:
      tags: [Payment]
      summary: Initiate a payment transaction
      operationId: initiatePayment
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/InitiatePaymentDTO'
      responses:
        '201':
          description: PaymentIntent created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaymentIntent'
        '400':
          description: Bad request
        '401':
          description: Unauthorized

  /payment/stripe-webhook:
    post:
      tags: [Payment]
      summary: Handle Stripe webhook events
      operationId: stripeWebhookHandler
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              description: Stripe webhook payload
      responses:
        '200':
          description: Webhook processed successfully
        '400':
          description: Invalid request or unsupported event

  /user:
    post:
      tags: [User]
      summary: Create a new user
      operationId: createUser
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateUserDTO'
      responses:
        '201':
          description: User created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponseDTO'
        '400':
          description: Bad request

  /user/me:
    get:
      tags: [User]
      summary: Get current authenticated user
      operationId: getCurrentUser
      responses:
        '200':
          description: Current user retrieved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponseDTO'
        '401':
          description: Unauthorized
        '404':
          description: No record for current user

  /user/{id}:
    get:
      tags: [User]
      summary: Get a user by ID
      operationId: getUserById
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: User retrieved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponseDTO'
        '404':
          description: User not found

  /venue:
    post:
      tags: [Venue]
      summary: Create a new venue
      operationId: createVenue
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateVenueDTO'
      responses:
        '201':
          description: Venue created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VenueResponseDTO'
        '400':
          description: Bad request

  /venue/{id}:
    get:
      tags: [Venue]
      summary: Get a venue by ID
      operationId: getVenueById
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Venue found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VenueResponseDTO'
        '404':
          description: Venue not found

components:
  schemas:
    CreateEventDTO:
      type: object
      required:
        - title
        - venueId
        - performerIds
        - date
      properties:
        title:
          type: string
          minLength: 3
          maxLength: 100
        description:
          type: string
          nullable: true
        venueId:
          type: integer
        performerIds:
          type: array
          items:
            type: integer
        date:
          type: string
          format: date

    EventResponseDTO:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        description:
          type: string
          nullable: true
        date:
          type: string
          format: date
        venueId:
          type: integer

    PaginatedEventResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/EventResponseDTO'
        totalCount:
          type: integer

    InitiatePaymentDTO:
      type: object
      required:
        - ticketId
      properties:
        ticketId:
          type: integer

    PaymentIntent:
      type: object
      properties:
        id:
          type: string
        object:
          type: string
        amount:
          type: integer
        currency:
          type: string
        status:
          type: string
        client_secret:
          type: string

    CreatePerformerDTO:
      type: object
      required:
        - name
        - social_url
      properties:
        name:
          type: string
          maxLength: 100
        social_url:
          type: string
          format: uri
        label:
          type: string

    PerformerResponseDTO:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        social_url:
          type: string
          format: uri
        label:
          type: string

    PaginatedPerformerResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/PerformerResponseDTO'
        totalCount:
          type: integer

    CreateTicketBatchDTO:
      type: object
      required:
        - eventId
        - price
        - count
        - section
      properties:
        eventId:
          type: integer
        price:
          type: number
        count:
          type: integer
        section:
          type: string
        type:
          type: string
          nullable: true

    TicketResponseDTO:
      type: object
      properties:
        id:
          type: integer
        price:
          type: number
        status:
          type: string
          enum:
            - AVAILABLE
            - RESERVED
            - PURCHASED
        type:
          type: string
        seat:
          type: string
        eventId:
          type: integer
        userId:
          type: integer
          nullable: true

    PaginatedTicketResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/TicketResponseDTO'
        totalCount:
          type: integer

    CreateUserDTO:
      type: object
      required:
        - first_name
        - last_name
        - email
      properties:
        first_name:
          type: string
        last_name:
          type: string
        email:
          type: string
          format: email
        phone_number:
          type: string
          nullable: true

    UserResponseDTO:
      type: object
      properties:
        id:
          type: integer
        first_name:
          type: string
        last_name:
          type: string
        email:
          type: string
          format: email
        phone_number:
          type: string
          nullable: true

    CreateVenueDTO:
      type: object
      required:
        - name
        - capacity
        - google_maps_url
      properties:
        name:
          type: string
          minLength: 5
          maxLength: 150
        capacity:
          type: integer
          minimum: 50
          maximum: 5000
        google_maps_url:
          type: string
          format: uri
          nullable: true

    VenueResponseDTO:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        capacity:
          type: integer
        google_maps_url:
          type: string
          format: uri
          nullable: true
